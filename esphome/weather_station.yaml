esphome:
  name: weather-station
  friendly_name: Weather Station RF Receiver

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API (required so ESPHome can fire HA events)
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Weather Station Fallback"
    password: !secret ap_password

# ─── RTL_433 decoder via external component ──────────────────────────────────
# This component listens on the CC1101 radio, decodes received 433 MHz messages
# using the RTL_433 protocol library, and fires an esphome.rf_message_received
# event on the Home Assistant event bus for each decoded packet.
#
# Source: https://github.com/NorthernMan54/esphome-rtl_433
external_components:
  - source: github://NorthernMan54/esphome-rtl_433

rtl_433:
  frequency: 433920000   # standard 433.92 MHz band

# ─── CC1101 transceiver (SPI) ────────────────────────────────────────────────
# Adjust the pin numbers to match your ESP32 ↔ CC1101 wiring.
# A typical ESP32 dev-board wiring is shown below.
cc1101:
  mosi_pin: GPIO23
  miso_pin: GPIO19
  sck_pin:  GPIO18
  cs_pin:   GPIO5
  gdo0_pin: GPIO21
  gdo2_pin: GPIO22
